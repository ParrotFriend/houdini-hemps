<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Houdini Hemps — Customer Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#1C1A15;--surface:#252218;--border:#3D3826;
  --text:#F0E8D0;--muted:#8C7F60;--accent:#7A9E4A;
  --accent-dk:#5A7A3A;--radius:10px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:380px;}
.brand{text-align:center;margin-bottom:2rem;}
.logo{width:64px;height:64px;background:#2A3A1A;border:1px solid var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:28px;}
.brand h1{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-0.5px;}
.brand p{font-size:13px;color:var(--muted);margin-top:3px;}
.form-group{margin-bottom:1.25rem;}
label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px;}
.code-input{
  width:100%;padding:16px;font-size:32px;font-weight:700;
  letter-spacing:12px;text-align:center;
  border:1px solid var(--border);border-radius:var(--radius);
  background:var(--bg);color:var(--text);outline:none;
  transition:border-color 0.15s;
}
.code-input::placeholder{color:var(--border);letter-spacing:8px;font-size:24px;}
.code-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(122,158,74,0.12);}
.btn{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;margin-top:0.5rem;transition:background 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn:hover{background:var(--accent-dk);}
.btn:disabled{opacity:0.6;cursor:not-allowed;}
.error-msg{display:none;background:rgba(192,57,43,0.15);color:#E07060;border:1px solid rgba(192,57,43,0.3);border-radius:var(--radius);padding:9px 12px;font-size:13px;margin-bottom:1rem;text-align:center;}
.divider{border:none;border-top:1px solid var(--border);margin:1.5rem 0 1rem;}
.footer-note{text-align:center;font-size:12px;color:var(--muted);}
.admin-link{display:block;text-align:center;margin-top:1rem;font-size:12px;color:var(--muted);text-decoration:none;}
.admin-link:hover{color:var(--accent);}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="logo">🌿</div>
    <h1>Houdini Hemps</h1>
    <p>Enter your 6-digit loyalty code</p>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <div class="form-group">
    <label for="code">Your Code</label>
    <input class="code-input" type="tel" id="code" placeholder="000000" maxlength="6" autocomplete="off"/>
  </div>

  <button class="btn" id="login-btn" onclick="handleLogin()">Sign in</button>

  <hr class="divider"/>
  <p class="footer-note">Don't have a code? Ask our staff to register you.</p>
  <a class="admin-link" href="admin-login.html">Staff / Admin login →</a>
</div>

<script>
  const SUPABASE_URL = 'https://gzlervyhpbomdwpfxmes.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6bGVydnlocGJvbWR3cGZ4bWVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwOTg3MjQsImV4cCI6MjA5NzY3NDcyNH0.Pb17-wvn_jbbuhzNUWKmP2_AOLVytJotxVexq4KTfmc';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  if (sessionStorage.getItem('hh_customer')) {
    window.location.href = 'customer-dashboard.html';
  }

  // Only allow numbers
  document.getElementById('code').addEventListener('input', function() {
    this.value = this.value.replace(/[^0-9]/g, '').slice(0, 6);
  });

  function setLoading(on) {
    const btn = document.getElementById('login-btn');
    btn.disabled = on;
    btn.innerHTML = on ? '<div class="spinner"></div> Checking...' : 'Sign in';
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  async function handleLogin() {
    const code = document.getElementById('code').value.trim();
    document.getElementById('error-msg').style.display = 'none';

    if (code.length !== 6) { showError('Please enter your 6-digit code.'); return; }

    setLoading(true);
    try {
      const { data, error } = await db
        .from('customers')
        .select('*')
        .eq('code', code)
        .single();

      if (error || !data) {
        showError('Code not found. Please check and try again.');
        return;
      }

      sessionStorage.setItem('hh_customer', JSON.stringify(data));
      window.location.href = 'customer-dashboard.html';
    } catch (e) {
      showError('Connection error. Please try again.');
    } finally {
      setLoading(false);
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
